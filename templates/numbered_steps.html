<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --darkest: #051024;
    --orange: #ff7a48;
    --muted: #5a6a80;
  }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background-color: var(--darkest);
    background-image:
      radial-gradient(ellipse 500px 350px at 85% 5%, rgba(255,122,72,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 600px 400px at -10% 95%, rgba(16,55,120,0.25) 0%, transparent 70%);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 110px 100px;
    gap: 0;
    position: relative;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 90px;
    color: #fff;
  }

  .steps {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 40px;
    position: relative;
  }

  .step-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 80px;
  }

  .step-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: rgba(255,255,255,0.12);
    position: relative;
    z-index: 2;
  }

  .step-line {
    width: 1.5px;
    flex: 1;
    min-height: 60px;
    background: linear-gradient(to bottom, rgba(255,122,72,0.4), rgba(255,122,72,0.1));
    margin-top: 4px;
    margin-bottom: 4px;
  }

  .step:last-child .step-line { display: none; }

  .step-content {
    padding-top: 8px;
    padding-bottom: 70px;
  }

  .step:last-child .step-content { padding-bottom: 0; }

  .step-title {
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.05em;
    color: #fff;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .step-sub {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--orange);
  }

  .footer {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #2d3f55;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="headline">{{ headline }}</div>

<div class="steps">
  {% for step in steps %}
  <div class="step">
    <div class="step-left">
      <div class="step-number">{{ step.number }}</div>
      <div class="step-line"></div>
    </div>
    <div class="step-content">
      <div class="step-title">{{ step.title }}</div>
      <div class="step-sub">{{ step.subtitle }}</div>
    </div>
  </div>
  {% endfor %}
</div>

<div class="footer">PORVENIR AGENCIA DIGITAL</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --darkest: #051024;
    --dark2:   #071830;
    --orange:  #ff7a48;
    --muted:   #5a6a80;
    --card:    rgba(255,255,255,0.035);
    --border:  rgba(255,255,255,0.07);
  }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background-color: var(--darkest);
    background-image:
      radial-gradient(ellipse 700px 500px at 85% -5%, rgba(255,122,72,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 600px 450px at -10% 110%, rgba(16,55,120,0.3) 0%, transparent 65%);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 88px 56px;
    position: relative;
  }

  .tag {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .icon-wrap {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,122,72,0.09);
    border: 1.5px solid rgba(255,122,72,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 0 40px rgba(255,122,72,0.12);
  }
  .icon-wrap i { color: var(--orange); width: 46px; height: 46px; }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 90px;
    line-height: 0.88;
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 44px;
  }
  .headline .org { color: var(--orange); }

  .features { list-style: none; width: 100%; display: flex; flex-direction: column; gap: 14px; }

  .fi {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    border-radius: 0 16px 16px 0;
    padding: 20px 26px;
  }
  .fi-icon {
    flex-shrink: 0;
    width: 46px; height: 46px;
    background: rgba(255,122,72,0.1);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .fi-icon i { color: var(--orange); width: 22px; height: 22px; }
  .fi-title {
    font-size: 15px; font-weight: 800;
    letter-spacing: 0.05em;
    color: #fff; margin-bottom: 4px;
  }
  .fi-sub { font-size: 14px; color: var(--muted); font-weight: 400; }

  footer {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.2em; color: #25374f;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="tag">{{ tag }}</div>

<div class="icon-wrap">
  <i data-lucide="{{ icon }}"></i>
</div>

<div class="headline">
  {{ headline_white }}<br><span class="org">{{ headline_orange }}</span>
</div>

<ul class="features">
  {% for f in features %}
  <li class="fi">
    <div class="fi-icon"><i data-lucide="{{ f.icon }}"></i></div>
    <div>
      <div class="fi-title">{{ f.title }}</div>
      <div class="fi-sub">{{ f.subtitle }}</div>
    </div>
  </li>
  {% endfor %}
</ul>

<footer>www.porveniragenciadigital.com</footer>
<script>lucide.createIcons();</script>
</body>
</html>

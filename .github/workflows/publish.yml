name: Publicar en Instagram

on:
  workflow_dispatch:  # disparado por cron-job.org (lun/mié/vie 10:00 Europe/Madrid)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      - name: Generar imagen del post
        run: python generate.py

      - name: Commit imagen y estado al repositorio
        run: |
          git config user.name "Porvenir Bot"
          git config user.email "bot@porveniragenciadigital.com"
          git add output/ state.json
          git diff --staged --quiet || git commit -m "bot: post $(date +%Y-%m-%d)"
          git push

      - name: Esperar a que GitHub propague el commit
        run: sleep 15

      - name: Publicar en Instagram
        run: python publish.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
